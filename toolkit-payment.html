<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creator Toolkit Payment - Prime Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f1117,#1c2230);
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
text-align:center;
padding:20px;
border-bottom:1px solid #2a3142;
}

.container{
max-width:520px;
margin:auto;
padding:30px 18px;
}

.card{
background:#1a1f2b;
border:1px solid #2a3142;
border-radius:16px;
padding:25px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.product{
font-size:20px;
margin-bottom:5px;
}

.price{
font-size:24px;
color:#4facfe;
margin:10px 0 20px;
font-weight:600;
}

.qr{
background:#252b3a;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

.qr img{
width:100%;
max-width:260px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:12px;
border-radius:8px;
border:none;
background:#2a3142;
color:white;
}

button{
margin-top:15px;
background:linear-gradient(45deg,#4facfe,#00c6ff);
border:none;
padding:12px;
width:100%;
border-radius:25px;
color:white;
font-size:15px;
cursor:pointer;
}

.instructions{
margin-top:20px;
background:#151a25;
border:1px solid #2a3142;
border-radius:14px;
padding:16px;
font-size:13px;
color:#9aa4b2;
line-height:1.6;
}

footer{
text-align:center;
padding:15px;
font-size:13px;
color:#9aa4b2;
border-top:1px solid #2a3142;
margin-top:auto;
}

</style>
</head>

<body>

<header>
<h1>Prime Store</h1>
</header>

<div class="container">

<div class="card">

<div class="product">Creator Toolkit</div>

<div class="price">Amount: ₹149</div>

<div class="qr">
<img src="qr149.png" alt="Scan QR to Pay ₹149">
</div>

<p>UPI ID: <b>primehub@ptyes</b></p>

<h3>Upload Payment Screenshot</h3>

<input type="file">

<button onclick="window.location.href='success.html'">
Submit Payment
</button>

</div>

<div class="instructions">

<b>Payment Instructions</b><br>

1. Open your UPI app.<br>
2. Scan the QR code.<br>
3. Pay exactly ₹149.<br>
4. Upload payment screenshot.<br>
5. Your download will be sent after verification.

</div>

</div>

<footer>
Made with ❤️ by Soham
</footer>

</body>
</html>
